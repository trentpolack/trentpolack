name: Wakatime Readme

on:
  schedule:
    # Runs at 12am IST
    - cron: "0 0 * * *"
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true
      WAKATIME_API_KEY:
        required: true
jobs:
  waka-readme-stats:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: read 
      repository-projects: read
      security-events: write
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}